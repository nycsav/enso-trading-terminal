services:
  - type: web
    name: enso-trading-terminal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT
    envVars:
      - key: PUBLIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DASH_DEBUG
        value: "false"
    plan: free
